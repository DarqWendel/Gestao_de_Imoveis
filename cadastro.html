<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Inventário</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* Mesmo estilo do login para manter o padrão */
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(47, 34, 23, 0.8), rgba(47, 34, 23, 0.8)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1600&auto=format&fit=crop'); background-size: cover; background-position: center; font-family: 'Poppins', sans-serif; }
        .login-card { background: white; width: 100%; max-width: 450px; padding: 50px; border-radius: 20px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: #3b2a1a; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #e1d8cf; border-radius: 10px; box-sizing: border-box; }
        .btn-reg { width: 100%; padding: 16px; background: #c79a6b; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Criar Conta</h2>
            <form id="formReg">
                <div class="form-group"><input type="text" id="n" placeholder="Nome Completo" required></div>
                <div class="form-group"><input type="text" id="u" placeholder="Usuário/E-mail" required></div>
                <div class="form-group"><input type="password" id="s" placeholder="Senha" required></div>
                <button type="submit" class="btn-reg">Cadastrar</button>
            </form>
            <a href="login.html" style="color:#c79a6b; display:block; margin-top:15px">Já tenho conta</a>
        </div>
    </div>
    <script>
        document.getElementById('formReg').onsubmit = async (e) => {
            e.preventDefault();
            const resp = await fetch('/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: document.getElementById('n').value,
                    login: document.getElementById('u').value,
                    senha: document.getElementById('s').value
                })
            });
            const res = await resp.json();
            if (res.ok) {
                alert("Cadastro feito!");
                window.location.href = 'login.html';
            } else {
                alert("Erro ao cadastrar!");
            }
        };
    </script>
</body>
</html>
