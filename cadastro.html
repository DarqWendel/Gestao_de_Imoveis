<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Inventário</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; }
        .bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(47,34,23,0.8), rgba(47,34,23,0.8)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1600&auto=format&fit=crop'); background-size: cover; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 400px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: #3b2a1a; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-reg { width: 100%; padding: 15px; background: #c79a6b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg">
        <div class="card">
            <h2>Criar Conta</h2>
            <form id="fReg">
                <input type="text" id="nome" placeholder="Nome Completo" required>
                <input type="text" id="user" placeholder="Usuário / E-mail" required>
                <input type="password" id="pass" placeholder="Senha" required>
                <button type="submit" class="btn-reg">Cadastrar Usuário</button>
            </form>
            <a href="login.html" style="color:#c79a6b; display:block; margin-top:15px; text-decoration:none;">Já tenho uma conta</a>
        </div>
    </div>
    <script>
        document.getElementById('fReg').onsubmit = async (e) => {
            e.preventDefault();
            const r = await fetch('/api/registrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nome: document.getElementById('nome').value,
                    login: document.getElementById('user').value,
                    senha: document.getElementById('pass').value
                })
            });
            const res = await r.json();
            if(res.ok) {
                alert("Cadastro realizado com sucesso!");
                window.location.href = 'login.html';
            } else {
                alert("Erro ao realizar cadastro.");
            }
        };
    </script>
</body>
</html>
