<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(rgba(47,34,23,0.7), rgba(47,34,23,0.7)), url('https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1600&auto=format&fit=crop'); background-size: cover; }
        .card { background: white; padding: 40px; border-radius: 30px; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: #3b2a1a; font-size: 32px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #8b5e3c; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; outline: none; background: #f8faff; }
        .btn { width: 100%; padding: 18px; background: #b08968; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: 500; }
        a { color: #b08968; text-decoration: none; display: block; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Criar Conta</h2>
        <form id="meuFormCadastro">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="nomeInput" required>
            </div>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="usuarioInput" required>
            </div>
            <div class="form-group">
                <label>Senha de Acesso</label>
                <input type="password" id="senhaInput" required>
            </div>
            <button type="submit" class="btn">Finalizar Cadastro</button>
        </form>
        <a href="login.html">Já possui acesso? Faça login aqui</a>
    </div>

    <script>
        document.getElementById('meuFormCadastro').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Carregando...";

            const dados = {
                nome: document.getElementById('nomeInput').value,
                login: document.getElementById('usuarioInput').value,
                senha: document.getElementById('senhaInput').value
            };

            try {
                const resp = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const res = await resp.json();
                if (res.ok) {
                    alert("Conta criada com sucesso!");
                    window.location.href = 'login.html';
                } else {
                    alert("Erro ao cadastrar.");
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
            } finally {
                btn.innerText = "Finalizar Cadastro";
            }
        };
    </script>
</body>
</html>
