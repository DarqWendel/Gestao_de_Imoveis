<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(rgba(47,34,23,0.72), rgba(47,34,23,0.72)),
                        url('https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        .card {
            background: white;
            padding: 45px 40px;
            border-radius: 24px;
            width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
            text-align: center;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            color: #3b2a1a;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #999;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #8b5e3c;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e8e0d8;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            background: #faf8f6;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #b08968; background: white; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #b08968;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #9a7455; transform: translateY(-1px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .link-cadastro {
            color: #b08968;
            text-decoration: none;
            display: block;
            margin-top: 20px;
            font-size: 13px;
        }
        .link-cadastro:hover { text-decoration: underline; }
        .msg-erro {
            background: #fde8e8;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Bem-vindo</h2>
        <p class="subtitle">Entre com seu e-mail e senha</p>

        <div class="msg-erro" id="msgErro"></div>

        <form id="formLogin">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn" id="btnLogin">Entrar no Sistema</button>
        </form>

        <a href="cadastro.html" class="link-cadastro">Não tem conta? Cadastre-se aqui</a>
    </div>

    <script>
        document.getElementById('formLogin').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const msgErro = document.getElementById('msgErro');

            msgErro.style.display = 'none';
            btn.disabled = true;
            btn.innerText = 'Entrando...';

            const dados = {
                email: document.getElementById('email').value.trim(),
                senha: document.getElementById('senha').value
            };

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const res = await resp.json();

                if (res.ok) {
                    localStorage.setItem('usuarioLogado', res.nome);
                    localStorage.setItem('emailLogado', res.email);
                    window.location.href = 'dashboard.html';
                } else {
                    msgErro.innerText = '✗ ' + (res.error || 'E-mail ou senha incorretos.');
                    msgErro.style.display = 'block';
                }
            } catch (err) {
                msgErro.innerText = '✗ Erro de conexão com o servidor.';
                msgErro.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Entrar no Sistema';
            }
        };
    </script>
</body>
</html>
