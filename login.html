<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Inventário de Imóveis</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* NOVA IMAGEM DE FUNDO: Interior de Luxo Sofisticado */
            background: linear-gradient(rgba(47, 34, 23, 0.75), rgba(47, 34, 23, 0.75)), 
                        url('https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Playfair Display', serif;
            color: #3b2a1a;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-card p {
            color: #888;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #6b4f3a;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e1d8cf;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #c79a6b;
            box-shadow: 0 0 0 3px rgba(199, 154, 107, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #c79a6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #b18357;
            transform: translateY(-2px);
        }

        .back-home {
            display: inline-block;
            margin-top: 25px;
            color: #c79a6b;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-home:hover {
            color: #3b2a1a;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h2>Bem-vindo</h2>
            <p>Acesse o painel administrativo de inventário</p>

            <form action="#">
                <div class="form-group">
                    <label>E-mail Corporativo</label>
                    <input type="email" placeholder="nome@empresa.com" required>
                </div>

                <div class="form-group">
                    <label>Senha de Acesso</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Entrar no Sistema</button>
            </form>

            <a href="index.html" class="back-home">← Voltar para a página inicial</a>
        </div>
    </div>

</body>
</html>
